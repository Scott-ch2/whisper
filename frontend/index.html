<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Whisper — AI Speech Translation</title>
    <style>
      /* Critical font loading — prevent FOUT */
      body { opacity: 0; transition: opacity 0.2s ease; }
      body.fonts-loaded { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Wait for fonts before showing content
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => document.body.classList.add('fonts-loaded'));
      } else {
        document.body.classList.add('fonts-loaded');
      }
    </script>
  </body>
</html>
